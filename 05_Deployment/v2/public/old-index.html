<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Review Sentiment Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; }
  textarea { width: 100%; min-height: 100px; font-size: 16px; padding: 10px; box-sizing: border-box; }
  button { margin-top: 12px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  #result { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; }
  #result.positive { background: #e6f7e9; }
  #result.neutral  { background: #fff8e1; }
  #result.negative { background: #fdecea; }
  .scores { font-size: 13px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Review Sentiment Checker</h1>
  <textarea id="text" placeholder="Paste a product review..."></textarea>
  <br />
  <button id="submit">Analyze</button>
  <div id="result"></div>

  <script>
    const btn = document.getElementById("submit");
    const textEl = document.getElementById("text");
    const resultEl = document.getElementById("result");

    btn.addEventListener("click", async () => {
      const text = textEl.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.textContent = "Analyzing...";
      resultEl.style.display = "none";

      try {
        const res = await fetch("/api/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        resultEl.className = data.label;
        resultEl.style.display = "block";
        resultEl.innerHTML = `
          <strong>Sentiment: ${data.label}</strong>
          <div class="scores">
            ${Object.entries(data.scores)
              .map(([k, v]) => `${k}: ${(v * 100).toFixed(1)}%`)
              .join(" &nbsp;·&nbsp; ")}
          </div>`;
      } catch (err) {
        resultEl.className = "";
        resultEl.style.display = "block";
        resultEl.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze";
      }
    });
  </script>
</body>
</html>
